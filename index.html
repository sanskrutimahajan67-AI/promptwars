<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbonSaathi 🌱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: white;
    padding: 20px;
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    font-size: 2.8em;
    margin-bottom: 5px;
    color: #4ade80;
  }

  .subtitle {
    text-align: center;

    margin-bottom: 30px;
    font-size: 1em;
  }

  .card {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .card h3 {
    color: #4ade80;
    margin-bottom: 16px;
    font-size: 1em;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  label {
    display: block;
    margin-bottom: 6px;
    color: #cbd5e1;
    font-size: 0.9em;
    font-weight: 500;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"],
  select {
    width: 100%;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 0.95em;
    margin-bottom: 16px;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #4ade80;
  }

  select option {
    background: #1e3a4a;
    color: white;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #4ade80, #22d3ee);
    border: none;
    border-radius: 10px;
    font-size: 1.05em;
    font-weight: bold;
    color: #0f2027;
    cursor: pointer;
    margin-top: 4px;
  }

  .btn:hover {
    opacity: 0.88;
  }

  .btn:active {
    transform: scale(0.98);
  }

  #loadingDiv {
    display: none;
    text-align: center;
    padding: 24px;
    color: #4ade80;
    font-size: 1em;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #resultDiv {

    background: rgba(74,222,128,0.07);
    border: 1px solid rgba(74,222,128,0.4);

    padding: 16px;
    margin-top: 16px;
    color: #fca5a5;
    font-size: 0.9em;
  }
</style>
</head>
<body>

<div class="container">

  <h1>🌱 CarbonSaathi</h1>
  <p class="subtitle">Your Personal Carbon Footprint AI Agent — Made for India</p>

  <!-- API Key -->
  <div class="card">
    <h3>🔑 Gemini API Key</h3>
    <label>Paste your API key from aistudio.google.com</label>
    <input type="password" id="apiKey" placeholder="AIzaSy..."/>
  </div>

  <!-- User Form -->
  <div class="card">
    <h3>🌍 Your Lifestyle</h3>

    <label>🏙️ Your City</label>
    <input type="text" id="city" placeholder="e.g. Nanded, Pune, Mumbai"/>

    <label>🚗 Daily Transport</label>
    <select id="transport">
      <option value="petrol car">🚗 Petrol Car</option>
      <option value="bike or scooter" selected>🏍️ Bike / Scooter</option>
      <option value="electric vehicle">⚡ Electric Vehicle</option>
      <option value="bus or local train">🚌 Bus / Local Train</option>
      <option value="walking or cycling">🚶 Walking / Cycling</option>
    </select>

    <label>⚡ Monthly Electricity Usage (Units)</label>
    <input type="number" id="electricity" placeholder="e.g. 150" min="1"/>

    <label>🍽️ Diet Type</label>
    <select id="diet">
      <option value="non-vegetarian">🍖 Non-Vegetarian</option>
      <option value="vegetarian" selected>🥗 Vegetarian</option>
      <option value="vegan">🌿 Vegan</option>
    </select>

    <button class="btn" id="calcBtn">🌍 Calculate My Carbon Footprint</button>
  </div>

  <!-- Loading -->
  <div id="loadingDiv">⏳ CarbonSaathi AI Agent is analyzing your lifestyle...</div>

  <!-- Error -->
  <div id="errorDiv"></div>

  <!-- Result -->
  <div id="resultDiv"></div>

</div>

<script>
  // Attach click event properly
  document.getElementById('calcBtn').addEventListener('click', function() {
    runCalculation();
  });

  async function runCalculation() {

    var apiKey      = document.getElementById('apiKey').value.trim();
    var city        = document.getElementById('city').value.trim();
    var transport   = document.getElementById('transport').value;
    var electricity = document.getElementById('electricity').value.trim();
    var diet        = document.getElementById('diet').value;

    // Hide previous results
    document.getElementById('resultDiv').style.display = 'none';
    document.getElementById('errorDiv').style.display  = 'none';

    // Validation
    if (!apiKey) {
      showError('Please enter your Gemini API key!');
      return;
    }
    if (!city) {
      showError('Please enter your city name!');
      return;
    }
    if (!electricity || electricity <= 0) {
      showError('Please enter your monthly electricity usage!');
      return;
    }

    // Show loading
    document.getElementById('loadingDiv').style.display = 'block';

    var prompt = "You are CarbonSaathi, an expert carbon footprint AI agent for India.\n\n" +
      "A user from " + city + ", India shared their lifestyle:\n" +
      "- Daily transport: " + transport + "\n" +
      "- Monthly electricity: " + electricity + " units (kWh)\n" +
      "- Diet: " + diet + "\n\n" +
      "Please do the following:\n" +
      "1. Calculate their approximate monthly carbon footprint in kg CO2\n" +
      "2. Compare it with average Indian (165 kg CO2 per month)\n" +
      "3. Give them a badge:\n" +
      "   🌱 Seedling = above average\n" +
      "   🌿 Sapling = near average\n" +
      "   🌳 Tree = below average\n" +
      "   🌲 Forest Guardian = very low footprint\n" +
      "4. Give 3 specific tips based on their city and lifestyle\n" +
      "5. Tell them how many trees equivalent their footprint is\n\n" +
      "Use emojis, be encouraging and positive. Format it beautifully.";

    var body = JSON.stringify({
      contents: [
        {
          parts: [
            { text: prompt }
          ]
        }
      ]
    });

    try {
      var response = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body
        }
      );

      var data = await response.json();

      document.getElementById('loadingDiv').style.display = 'none';

      if (data.error) {
        showError('API Error: ' + data.error.message + '\n\nCheck your API key!');
        return;
      }

      if (data.candidates && data.candidates[0] && data.candidates[0].content) {
        var text = data.candidates[0].content.parts[0].text;
        document.getElementById('resultDiv').innerText = text;
        document.getElementById('resultDiv').style.display = 'block';
      } else {
        showError('Unexpected response. Please try again!');
      }

    } catch (err) {
      document.getElementById('loadingDiv').style.display = 'none';
      showError('Network error! Check your internet connection.\n\nDetails: ' + err.message);
    }
  }

  function showError(msg) {
    document.getElementById('loadingDiv').style.display = 'none';
    document.getElementById('errorDiv').innerText = '❌ ' + msg;
    document.getElementById('errorDiv').style.display = 'block';
  }
</script>

</body>
</html>
